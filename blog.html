<!DOCTYPE html>
<html lang="pl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekcja: Blog</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Techniczny kontener, który zapewnia 'sztywny' układ i nie rozlewa treści */
        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Sekcja na Twój kod lub treść */
        .content-area {
            width: 100%;
            min-height: 400px; /* Aby pusta strona nie była całkiem płaska */
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <header id="blog-header">
            </header>

        <main class="content-area">
            </main>

        <footer id="blog-footer">
            </footer>

    </div>

</body>
